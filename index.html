<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Прихисток — сайт для пошуку та усиновлення котів. Адаптивний дизайн: мобільна та десктопна версія.">
<title>Прихисток — знайди свого кота</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stage">

  <!-- ===================== PHONE FRAME ===================== -->
  <div class="phone" id="phone">

    <!-- status notch -->
    <div class="notch"></div>

    <!-- ============ SCREEN 1 : LOGIN ============ -->
    <section class="screen screen--login is-active" id="screen-login">
      <div class="login-portrait">
        <div class="cat-paw-illustration" aria-hidden="true">
          <svg viewBox="0 0 200 200" class="paw-svg">
            <ellipse cx="100" cy="120" rx="55" ry="48" fill="#2a2521"/>
            <ellipse cx="55" cy="60" rx="18" ry="24" fill="#2a2521"/>
            <ellipse cx="95" cy="42" rx="18" ry="24" fill="#2a2521"/>
            <ellipse cx="140" cy="48" rx="17" ry="23" fill="#2a2521"/>
            <ellipse cx="170" cy="78" rx="16" ry="22" fill="#2a2521"/>
          </svg>
        </div>
        <span class="case-id">CASE&nbsp;№ 00—ENTRY</span>
      </div>

      <div class="login-panel">
        <p class="eyebrow">Прихисток "Чотири Лапи"</p>
        <h1 class="login-title">Ніколи<br>не пізно<br><em>забрати кота</em></h1>
        <button class="btn btn--primary btn--block" id="btn-login">Увійти</button>
        <button class="link-btn" id="btn-guest">Продовжити як гість →</button>
      </div>
    </section>

    <!-- ============ SCREEN 2 : CATALOG ============ -->
    <section class="screen screen--catalog" id="screen-catalog">

      <header class="topbar">
        <button class="icon-btn" id="btn-menu" aria-label="Меню">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <span class="topbar-mark">Прихисток</span>
        <div class="avatar-chip" aria-hidden="true">🐾</div>
      </header>

      <nav class="tabs" role="tablist">
        <button class="tab is-active" data-tab="cats">Коти</button>
        <button class="tab" data-tab="care">Догляд</button>
        <button class="tab" data-tab="donate">Підтримати</button>
      </nav>

      <div class="card-feed" id="card-feed">
        <!-- cards injected by JS -->
      </div>
    </section>

    <!-- ============ SCREEN 3 : DETAIL (slides in) ============ -->
    <section class="screen screen--detail" id="screen-detail">
      <header class="detail-topbar">
        <button class="icon-btn icon-btn--ghost" id="btn-back" aria-label="Назад">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
        <span class="detail-name" id="detail-name">—</span>
        <button class="icon-btn icon-btn--ghost" id="btn-fav-detail" aria-label="Улюблене">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 20s-7-4.5-9.3-9C1.2 7.6 2.7 4.5 6 4.2 8 4 10 5 12 7.5 14 5 16 4 18 4.2c3.3.3 4.8 3.4 3.3 6.8C19 15.5 12 20 12 20z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
      </header>

      <div class="detail-scroll">
        <div class="detail-photo" id="detail-photo">
          <div class="photo-dots" id="photo-dots"></div>
          <span class="stamp" id="detail-stamp">У ПРИТУЛКУ</span>
        </div>

        <div class="detail-body">
          <p class="eyebrow eyebrow--detail">Справа притулку</p>
          <h2 class="detail-title" id="detail-title">Pancake</h2>

          <dl class="spec-list" id="spec-list"></dl>

          <h3 class="section-label">Додаткові деталі</h3>
          <p class="detail-notes" id="detail-notes"></p>
        </div>
      </div>

      <div class="detail-footer">
        <button class="icon-btn icon-btn--square" id="btn-fav-footer" aria-label="До улюблених">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 20s-7-4.5-9.3-9C1.2 7.6 2.7 4.5 6 4.2 8 4 10 5 12 7.5 14 5 16 4 18 4.2c3.3.3 4.8 3.4 3.3 6.8C19 15.5 12 20 12 20z" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
        <button class="btn btn--primary btn--grow" id="btn-adopt">Забрати додому</button>
      </div>
    </section>

  </div>
  <!-- ===================== /PHONE FRAME ===================== -->

  <p class="stage-hint">Натисни на картку кота, щоб відкрити справу →</p>
</div>

<!-- backdrop used only in desktop layout, when detail opens as a side drawer -->
<div class="overlay" id="overlay"></div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
